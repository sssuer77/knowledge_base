<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件导入服务 | 赛博朋克上传系统</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        /* 赛博朋克背景和基础样式 */
        body {
            background: #0a0a1a;
            background-image:
                linear-gradient(rgba(10, 10, 26, 0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10, 10, 26, 0.8) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #00ffcc;
            min-height: 100vh;
            padding: 20px;
        }

        /* 容器样式 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(0, 0, 20, 0.85);
            border: 1px solid #ff00ff;
            padding: 30px;
            border-radius: 8px;
            box-shadow:
                0 0 15px rgba(0, 255, 204, 0.5),
                inset 0 0 10px rgba(255, 0, 255, 0.3);
        }

        /* 标题样式 */
        h1 {
            text-align: center;
            color: #ff00ff;
            text-shadow:
                0 0 5px #ff00ff,
                0 0 10px #ff00ff,
                0 0 20px #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        /* 上传区域样式 */
        .upload-area {
            border: 2px dashed #00ffcc;
            padding: 60px 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(0, 255, 204, 0.2),
                transparent);
            transition: left 0.8s ease;
        }

        .upload-area:hover::before {
            left: 100%;
        }

        .upload-area:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }

        .upload-area h2 {
            color: #00ffcc;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .upload-area p {
            color: #ffff00;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .upload-area input {
            display: none;
        }

        /* 文件列表样式 */
        #fileList {
            gap: 15px;
            display: flex;
            flex-direction: column;
        }

        /* 单个文件项样式 */
        .file-item {
            background: rgba(0, 0, 40, 0.9);
            border: 1px solid #00ffcc;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
        }

        .file-item:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        /* 文件信息头部 */
        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-name {
            color: #ffff00;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #ffff00;
        }

        .file-size {
            color: #00ffff;
            font-size: 0.9rem;
        }

        /* 状态徽章 */
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
        }

        .status-uploading {
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            color: #00ffcc;
        }

        .status-processing {
            background: rgba(255, 255, 0, 0.2);
            border: 1px solid #ffff00;
            color: #ffff00;
        }

        .status-completed {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        .status-failed {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
        }

        /* 进度条样式 */
        .progress-container {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 30, 0.8);
            border: 1px solid #ff00ff;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #ff00ff);
            border-radius: 8px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            animation: progressGlow 1.5s infinite;
        }

        @keyframes progressGlow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* 日志区域样式 */
        .logs-toggle {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .logs-toggle:hover {
            background: rgba(0, 255, 204, 0.2);
            border-color: #ff00ff;
            color: #ff00ff;
        }

        .logs-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            background: rgba(0, 0, 20, 0.8);
            border: 1px solid #003366;
            border-radius: 4px;
            padding: 0 10px;
        }

        .logs-container.open {
            max-height: 300px;
            padding: 10px;
        }

        .log-item {
            color: #cccccc;
            font-size: 0.85rem;
            padding: 5px 0;
            border-bottom: 1px dashed rgba(0, 255, 204, 0.2);
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-done {
            color: #00ff00;
        }

        .log-running {
            color: #ffff00;
        }

        /* 响应式样式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .upload-area {
                padding: 40px 15px;
            }

            .file-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 文件导入服务 📡</h1>

        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <h2>📤 拖拽文件至此处 或 点击选择文件</h2>
            <p>支持格式: PDF (.pdf) / Markdown (.md)</p>
            <p>可同时上传多个文件</p>
            <input type="file" id="fileInput" multiple accept=".pdf,.md">
        </div>

        <!-- 文件列表 -->
        <div id="fileList"></div>
    </div>

    <script>
        // API基础地址（可根据实际情况修改）
        const API_BASE = 'http://127.0.0.1:8000';

        // DOM元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        // 初始化
        function init() {
            // 点击上传区域触发文件选择
            uploadArea.addEventListener('click', () => fileInput.click());

            // 文件选择事件
            fileInput.addEventListener('change', handleFileSelect);

            // 拖拽事件处理
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#ff00ff';
                uploadArea.style.boxShadow = '0 0 25px rgba(255, 0, 255, 0.5)';
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#00ffcc';
                uploadArea.style.boxShadow = '0 0 20px rgba(255, 0, 255, 0.4)';
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#00ffcc';
                uploadArea.style.boxShadow = '0 0 20px rgba(255, 0, 255, 0.4)';

                if (e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files);
                }
            });
        }

        // 处理文件选择
        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
        }

        // 处理文件（验证+创建文件项）
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                // 验证文件格式
                if (!['application/pdf', 'text/markdown', '.pdf', '.md'].some(type =>
                    file.type === type || file.name.endsWith(type)
                )) {
                    alert(`文件 ${file.name} 格式不支持！仅支持 PDF 和 Markdown 文件`);
                    return;
                }

                // 创建文件项
                createFileItem(file);
            });
        }

        // 创建文件项DOM
        function createFileItem(file) {
            // 创建文件项容器
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.dataset.fileId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);

            // 文件大小格式化（KB，保留2位小数）
            const fileSize = (file.size / 1024).toFixed(2) + ' KB';

            // 文件项HTML结构
            fileItem.innerHTML = `
                <div class="file-header">
                    <div class="file-name">${file.name}</div>
                    <div class="file-size">大小: ${fileSize}</div>
                    <div class="status-badge status-uploading">上传中...</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 0%"></div>
                </div>
                <button class="logs-toggle">📜 查看系统日志</button>
                <div class="logs-container"></div>
            `;

            // 添加到文件列表
            fileList.appendChild(fileItem);

            // 日志切换功能
            const logsToggle = fileItem.querySelector('.logs-toggle');
            const logsContainer = fileItem.querySelector('.logs-container');
            logsToggle.addEventListener('click', () => {
                logsContainer.classList.toggle('open');
                logsToggle.textContent = logsContainer.classList.contains('open')
                    ? '📜 收起系统日志'
                    : '📜 查看系统日志';
            });

            // 开始上传文件
            uploadFile(file, fileItem);
        }

        // 上传文件到服务器
        async function uploadFile(file, fileItem) {
            const progressBar = fileItem.querySelector('.progress-bar');
            const statusBadge = fileItem.querySelector('.status-badge');
            const logsContainer = fileItem.querySelector('.logs-container');

            try {
                // 创建FormData
                const formData = new FormData();
                formData.append('files', file);

                // 上传文件
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData,
                    // 进度监控
                    signal: AbortSignal.timeout(30000), // 30秒超时
                });

                if (!response.ok) {
                    throw new Error(`上传失败: ${response.status} ${response.statusText}`);
                }

                const result = await response.json();
                const taskId = result.task_ids?.[0];

                if (!taskId) {
                    throw new Error('未获取到任务ID');
                }

                // 更新状态：上传完成，开始处理
                statusBadge.className = 'status-badge status-processing';
                statusBadge.textContent = '任务进行中...';
                progressBar.style.width = '30%';

                // 添加上传成功日志
                addLog(logsContainer, `✅ 文件上传成功，任务ID: ${taskId}`, 'done');

                // 开始轮询任务状态
                pollTaskStatus(taskId, fileItem);

            } catch (error) {
                // 上传失败处理
                statusBadge.className = 'status-badge status-failed';
                statusBadge.textContent = '❌ 任务失败 ❌';
                progressBar.style.width = '100%';
                progressBar.style.background = 'linear-gradient(90deg, #ff0000, #cc0000)';

                // 添加错误日志
                addLog(logsContainer, `❌ 上传失败: ${error.message}`, 'running');
                console.error('上传错误:', error);
            }
        }

        // 轮询任务状态
        async function pollTaskStatus(taskId, fileItem) {
            const progressBar = fileItem.querySelector('.progress-bar');
            const statusBadge = fileItem.querySelector('.status-badge');
            const logsContainer = fileItem.querySelector('.logs-container');

            // 轮询函数
            const checkStatus = async () => {
                try {
                    const response = await fetch(`${API_BASE}/status/${taskId}`);

                    if (!response.ok) {
                        throw new Error(`获取状态失败: ${response.status}`);
                    }

                    const result = await response.json();
                    const { status, done_list = [], running_list = [] } = result;

                    // 处理完成日志
                    done_list.forEach(logText => {
                        const normalizedLog = normalizeDoneLog(logText);
                        addLog(logsContainer, normalizedLog, 'done');
                    });

                    // 处理进行中日志
                    running_list.forEach(logText => {
                        const normalizedLog = normalizeRunningLog(logText);
                        addLog(logsContainer, normalizedLog, 'running');
                    });

                    // 更新状态和进度
                    switch (status) {
                        case 'processing':
                            // 进度缓慢增加（30% ~ 90%）
                            const currentWidth = parseInt(progressBar.style.width);
                            if (currentWidth < 90) {
                                const newWidth = Math.min(currentWidth + Math.random() * 5, 90);
                                progressBar.style.width = `${newWidth}%`;
                            }
                            break;

                        case 'completed':
                            statusBadge.className = 'status-badge status-completed';
                            statusBadge.textContent = '✅ 任务完成 ✅';
                            progressBar.style.width = '100%';
                            addLog(logsContainer, '🎉 所有任务处理完成！', 'done');
                            return; // 停止轮询

                        case 'failed':
                            statusBadge.className = 'status-badge status-failed';
                            statusBadge.textContent = '❌ 任务失败 ❌';
                            progressBar.style.width = '100%';
                            progressBar.style.background = 'linear-gradient(90deg, #ff0000, #cc0000)';
                            addLog(logsContainer, '❌ 任务处理失败！', 'running');
                            return; // 停止轮询

                        default:
                            addLog(logsContainer, `⚠️ 未知状态: ${status}`, 'running');
                            break;
                    }

                    // 继续轮询
                    setTimeout(checkStatus, 2000);

                } catch (error) {
                    addLog(logsContainer, `⚠️ 获取状态失败: ${error.message}`, 'running');
                    console.error('状态轮询错误:', error);
                    // 失败后重试一次
                    setTimeout(checkStatus, 5000);
                }
            };

            // 开始第一次轮询
            setTimeout(checkStatus, 2000);
        }

        // 添加日志项
        function addLog(container, text, type) {
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${type}`;

            // 添加时间戳
            const time = new Date().toLocaleTimeString();
            logItem.textContent = `[${time}] ${text}`;

            // 添加到日志容器
            container.appendChild(logItem);

            // 滚动到最新日志
            container.scrollTop = container.scrollHeight;
        }

        // 标准化完成日志
        function normalizeDoneLog(text) {
            if (typeof text !== 'string') text = String(text);
            return text.endsWith('已完成') ? text : `${text} 已完成`;
        }

        // 标准化进行中日志
        function normalizeRunningLog(text) {
            if (typeof text !== 'string') text = String(text);
            return text.startsWith('正在进行') ? text : `正在进行 ${text.replace('处理中', '')}...`;
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
